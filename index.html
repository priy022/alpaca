// ── Sparkline (simple SVG bar chart) ──────────────────────────────────────
const Sparkline = ({values, color, height=32, width=120}) => {
  const max = Math.max(...values);
  const bw = width / values.length - 2;
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      {values.map((v,i) => {
        const bh = max > 0 ? (v/max)*(height-4) : 2;
        return <rect key={i} x={i*(bw+2)} y={height-bh} width={bw} height={bh} fill={color} rx={2} opacity={0.85}/>;
      })}
    </svg>
  );
};

// ── Mini donut ────────────────────────────────────────────────────────────
const MiniDonut = ({pct, color, size=48}) => {
  const r = (size-8)/2; const circ = 2*Math.PI*r;
  const fill = (pct/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={`${fill} ${circ-fill}`} strokeLinecap="round"/>
    </svg>
  );
};

          </div>
          <div style={{padding:'12px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{background:'rgba(255,255,255,0.04)',borderRadius:5,padding:'10px',textAlign:'center'}}>
              <div style={{fontFamily:'monospace',fontSize:9,color:'rgba(255,255,255,0.35)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>Model confidence</div>
              <div style={{fontFamily:'monospace',fontSize:22,fontWeight:600,color:C.teal,lineHeight:1}}>{scenario.confidence}%</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,0.3)',marginTop:3}}>{scenario.comparableCases} comparable cases</div>
            </div>
          </div>
        </div>

        {/* Main content */}
        <div style={{background:C.surface,overflowY:'auto',padding:'20px'}}>
          {activeView==='assessment' && <AssessmentView scenario={scenario} onFeedbackSent={()=>setFeedbackSent(true)} feedbackSent={feedbackSent}/>}
          {activeView==='feedback'   && <FeedbackView scenario={scenario} feedbackSent={feedbackSent}/>}
          {activeView==='payer'      && <PayerView scenario={scenario}/>}
          {activeView==='patterns'   && <PatternsView scenario={scenario}/>}
          {activeView==='reports'    && <ReportsView scenario={scenario}/>}
        </div>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
