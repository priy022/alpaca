    'BCBA':{fill:C.tealL,color:C.tealD,border:C.teal},
    'Coordinator':{fill:C.purpL,color:C.purpD,border:C.purp},
    'AI tool':{fill:C.indigoL,color:C.indigoD,border:C.indigo},
    'Payer':{fill:C.grayL,color:C.grayD,border:C.gray},
    'AI · auto':{fill:C.indigoL,color:C.indigoD,border:C.indigo},
    'System · auto':{fill:C.grayL,color:C.grayD,border:C.gray},
    'System · ready':{fill:C.greenL,color:C.greenD,border:C.green},
    'Payer · CO Medicaid':{fill:C.grayL,color:C.grayD,border:C.gray},
    'Payer · TRICARE':{fill:C.grayL,color:C.grayD,border:C.gray},
    'Coordinator · M. Torres':{fill:C.purpL,color:C.purpD,border:C.purp},
    'Coordinator · R. Patel':{fill:C.purpL,color:C.purpD,border:C.purp},
  };
  const s = map[label] || {fill:C.grayL,color:C.grayD,border:C.gray};
  return <Badge label={label} fill={s.fill} color={s.color} border={s.border}/>;
};

const CheckIcon = ({status}) => {
  const map = {
    ok:   {bg:C.greenL, color:C.green, symbol:'✓'},
    fail: {bg:C.redL,   color:C.red,   symbol:'✗'},
    warn: {bg:C.amberL, color:C.amber, symbol:'!'},
  };
  const s = map[status];
  return (
    <div style={{width:16,height:16,borderRadius:'50%',background:s.bg,
      display:'flex',alignItems:'center',justifyContent:'center',
      flexShrink:0,fontSize:9,fontWeight:800,color:s.color,marginTop:2}}>
      {s.symbol}
    </div>
  );
};

const Card = ({children, style={}}) => (
  <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,overflow:'hidden',...style}}>
    {children}
  </div>
);

const CardHeader = ({children, style={}}) => (
  <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,
    display:'flex',alignItems:'center',gap:8,...style}}>
    {children}
  </div>
);

// ── View: AI Assessment ────────────────────────────────────────────────────
const AssessmentView = ({scenario, onFeedbackSent, feedbackSent}) => {
  const s = scenario;
  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:C.text2}}>Case record + AI assessment</span>
        <Badge label={s.statusLabel} fill={s.statusColor+'22'} color={s.statusColor} border={s.statusColor}/>
      </div>

      {/* Denial banner */}
      {s.denialBanner && (
        <div style={{padding:'10px 14px',background:C.coralL,borderLeft:`3px solid ${C.coral}`,borderRadius:'0 4px 4px 0'}}>
          <div style={{fontSize:11,fontWeight:700,color:C.coralD,marginBottom:3}}>{s.denialBanner}</div>
          {s.overrideBanner && <div style={{fontSize:11,color:C.coralD,opacity:0.8}}>{s.overrideBanner}</div>}
        </div>
      )}

      {/* All clear */}
      {s.allClear && (
        <div style={{padding:'10px 14px',background:C.greenL,borderLeft:`3px solid ${C.green}`,borderRadius:'0 4px 4px 0'}}>
          <div style={{fontSize:11,fontWeight:700,color:C.greenD}}>All checks passed — ready for coordinator review and submission</div>
        </div>
      )}

      {/* Case metadata */}
      <Card>
        <CardHeader>
          <span style={{fontSize:12,fontWeight:600,color:C.text}}>Case metadata</span>
          <span style={{marginLeft:'auto',fontFamily:'monospace',fontSize:10,color:C.text2,background:C.grayL,padding:'2px 8px',borderRadius:3}}>{s.caseId}</span>
        </CardHeader>
        <div style={{padding:'12px 14px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:10}}>
            {[['Provider / BCBA', s.provider],['Payer', s.payer],['Submission date', s.submitted],
              ['CPT codes', s.cpt],['Hours / week', s.hours],['Auth window','180 days from approval']
            ].map(([k,v]) => (
              <div key={k} style={{background:C.grayL,borderRadius:4,padding:'8px 10px'}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:C.text2,marginBottom:2}}>{k}</div>
                <div style={{fontSize:11,fontWeight:500,color:C.text,fontFamily:k==='CPT codes'||k==='Submission date'?'monospace':'inherit'}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </Card>

      {/* Two layers */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {[{title:'Layer 1 — components', items:s.layer1, count:s.layer1.filter(x=>x.status!=='ok').length},
          {title:'Layer 2 — contents', items:s.layer2, count:s.layer2.filter(x=>x.status!=='ok').length}
        ].map(({title,items,count}) => (
          <Card key={title}>
            <div style={{padding:'7px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',
              background: count>0 ? C.amberL : C.greenL,
              borderBottom:`1px solid ${count>0?C.amber:C.green}`}}>
              <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:count>0?C.amber:C.green}}>{title}</span>
              {count>0 && <Badge label={`${count} flag${count>1?'s':''}`} fill={C.amberL} color={C.amber} border={C.amber}/>}
              {count===0 && <Badge label="all clear" fill={C.greenL} color={C.green} border={C.green}/>}
            </div>
            <div style={{padding:'8px 12px'}}>
              {items.map((item,i) => (
                <div key={i} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:i<items.length-1?`1px solid ${C.border}`:'none'}}>
                  <CheckIcon status={item.status}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:10.5,color:C.text}}>{item.label}</span>
                      {item.isNew && <Badge label="New rule" fill={C.purpL} color={C.purp} border={C.purp}/>}
                    </div>
                    {item.note && <div style={{fontSize:9.5,color:C.text2,marginTop:2,lineHeight:1.4}}>{item.note}</div>}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>

      {/* Recommendation */}
      <Card>
        <CardHeader>
          <span style={{fontSize:12,fontWeight:600,color:C.text}}>AI recommendation</span>
          <span style={{marginLeft:'auto',fontSize:10,color:C.text2}}>{s.confidence}% approval probability</span>
        </CardHeader>
        <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}}>
          {s.hardBlock && (
            <div style={{padding:'9px 12px 9px 14px',background:C.redL,borderLeft:`3px solid ${C.red}`,borderRadius:'0 4px 4px 0'}}>
              <div style={{fontSize:10.5,fontWeight:700,color:'#791F1F',marginBottom:2}}>Hard block — return to BCBA</div>
              <div style={{fontSize:10.5,color:C.text}}>{s.hardBlock}</div>
            </div>
          )}
          {s.softFlag && (
            <div style={{padding:'9px 12px 9px 14px',background:C.amberL,borderLeft:`3px solid ${C.amber}`,borderRadius:'0 4px 4px 0'}}>
              <div style={{fontSize:10.5,fontWeight:700,color:C.amberD,marginBottom:2}}>
                {s.hardBlock ? 'Soft flags — coordinator review' : s.patternAlert ? 'Pattern alert — coordinator review' : s.newRule ? 'New rule triggered — coordinator review' : 'Soft flag — coordinator review'}
              </div>
              <div style={{fontSize:10.5,color:C.text}}>{s.softFlag}</div>
            </div>
          )}
          {s.patternAlert && (
            <div style={{padding:'9px 12px 9px 14px',background:C.purpL,borderLeft:`3px solid ${C.purp}`,borderRadius:'0 4px 4px 0'}}>
              <div style={{fontSize:10.5,fontWeight:700,color:C.purpD,marginBottom:2}}>Coaching flag escalated to ops lead</div>
              <div style={{fontSize:10.5,color:C.text}}>Baseline data missing in 4 of 8 submissions from this provider. Pattern threshold crossed. Coaching intervention recommended.</div>
            </div>
          )}

          {/* Learning bar */}
          <div style={{background:C.navy,borderRadius:4,padding:'9px 12px',display:'flex',alignItems:'center',gap:12,marginTop:4}}>
            <span style={{fontSize:9.5,color:'rgba(255,255,255,0.45)',flex:1,fontFamily:'monospace'}}>{s.learningBar}</span>
            <span style={{fontSize:10,color:C.teal,fontFamily:'monospace',fontWeight:600,whiteSpace:'nowrap'}}>↻ learning</span>
          </div>

          {/* Actions */}
          <div style={{display:'flex',gap:8,marginTop:4}}>
            {!s.allClear && !s.denialBanner && (
              feedbackSent
                ? <button disabled style={{padding:'7px 14px',borderRadius:4,fontSize:11,fontWeight:500,background:C.grayL,color:C.gray,border:`1px solid ${C.border}`,cursor:'default'}}>Feedback sent ✓</button>
                : <button onClick={onFeedbackSent} style={{padding:'7px 14px',borderRadius:4,fontSize:11,fontWeight:500,background:C.teal,color:C.white,border:'none',cursor:'pointer'}}>
                    {s.hardBlock ? 'Send feedback to BCBA' : 'Send pattern alert to ops lead'}
                  </button>
            )}
            {s.allClear && (
              <button style={{padding:'7px 14px',borderRadius:4,fontSize:11,fontWeight:500,background:C.teal,color:C.white,border:'none',cursor:'pointer'}}>Submit to payer</button>
            )}
            {!s.allClear && !s.denialBanner && (
              <button style={{padding:'7px 14px',borderRadius:4,fontSize:11,fontWeight:500,background:'transparent',color:C.text2,border:`1px solid ${C.border}`,cursor:'pointer'}}>Override and submit</button>
            )}
          </div>
        </div>
      </Card>
    </div>
  );
};

// ── View: Feedback Log ─────────────────────────────────────────────────────

        <div style={{padding:'4px 14px'}}>
          {events.map((ev,i) => (

              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>

};

// ── View: Payer Rules ──────────────────────────────────────────────────────
const PayerView = ({scenario}) => {
  const {payerRules} = scenario;
  const catStyle = {
    'REQUIRED':{fill:C.indigoL,color:C.indigoD,border:C.indigo},
    'FLAG':{fill:C.amberL,color:C.amberD,border:C.amber},
    'EXCLUDED':{fill:C.coralL,color:C.coralD,border:C.coral},
  };
  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:C.text2}}>Payer rules — {payerRules.payer}</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontFamily:'monospace',fontSize:10,color:C.text2}}>Updated: {payerRules.updated}</span>
          <button style={{padding:'4px 10px',borderRadius:4,fontSize:10,fontWeight:500,background:'transparent',color:C.text2,border:`1px solid ${C.border}`,cursor:'pointer'}}>Update rules</button>
        </div>
      </div>
      <Card>
        <div style={{padding:'8px 14px'}}>
          {payerRules.rules.map((r,i) => {
            const cs = catStyle[r.cat];
            return (
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'9px 10px',
                background:r.triggered ? (r.cat==='REQUIRED'?C.redL:C.amberL) : i%2===0?C.grayL:C.white,
                borderRadius:4,marginBottom:5,border:r.triggered?`1px solid ${r.cat==='REQUIRED'?C.red:C.amber}`:'1px solid transparent'}}>
                <Badge label={r.cat} fill={cs.fill} color={cs.color} border={cs.border}/>
                {r.isNew && <Badge label="New" fill={C.purpL} color={C.purp} border={C.purp}/>}
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:500,color:r.triggered?C.text:C.text,marginBottom:2}}>{r.label}</div>
                  <div style={{fontSize:10,color:C.text2}}>{r.note}</div>
                </div>
                {r.triggered && <span style={{fontSize:9,color:r.cat==='EXCLUDED'?C.coral:C.amber,fontWeight:700,whiteSpace:'nowrap'}}>triggered ↑</span>}
                {r.ok && <span style={{fontSize:9,color:C.green,fontWeight:700}}>✓ passed</span>}
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
};

    setActiveScenario(n);
    setActiveView('assessment');
    setFeedbackSent(false);
  }, []);

  const navItems = [
    {id:'assessment', label:'AI assessment'},
    {id:'feedback',   label:'Feedback log'},
    {id:'payer',      label:'Payer rules'},
    {id:'patterns',   label:'Denial patterns'},
    {id:'reports',    label:'Provider reports'},

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',fontFamily:"'IBM Plex Sans',system-ui,sans-serif"}}>

        <span style={{fontFamily:'monospace',fontSize:11,color:'rgba(255,255,255,0.4)',whiteSpace:'nowrap'}}>Alpaca Health — Submission Coordinator</span>

              padding:'5px 14px',borderRadius:20,fontSize:10.5,fontWeight:600,cursor:'pointer',transition:'all 0.15s',
              background:activeScenario===n?C.teal:'transparent',
              color:activeScenario===n?C.white:'rgba(255,255,255,0.5)',
              border:activeScenario===n?`1px solid ${C.teal}`:'1px solid rgba(255,255,255,0.12)',

              {SCENARIOS[n].pill}
            </button>
          ))}

        <span style={{fontFamily:'monospace',fontSize:10,color:'rgba(255,255,255,0.3)',whiteSpace:'nowrap'}}>Test scenario {activeScenario} of 5</span>
      </div>

      {/* App shell */}
      <div style={{flex:1,display:'grid',gridTemplateColumns:'190px 1fr',gridTemplateRows:'44px 1fr',minHeight:0}}>

          <span style={{fontFamily:'monospace',fontSize:13,color:C.white,fontWeight:600}}>

          </span>
          <div style={{width:1,height:18,background:'rgba(255,255,255,0.1)'}}/>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>Submission coordinator</span>
          <span style={{marginLeft:'auto',fontFamily:'monospace',fontSize:11,color:'rgba(255,255,255,0.35)'}}>{scenario.caseId}</span>
          <div style={{display:'flex',alignItems:'center',gap:6,marginLeft:12}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:scenario.statusColor}} className={scenario.statusColor===C.amber?'pulse':''}/>
            <span style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>{scenario.statusLabel}</span>
          </div>
        </div>

        {/* Sidebar */}
        <div style={{background:C.navy2,borderRight:'1px solid rgba(255,255,255,0.06)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{flex:1,padding:'14px 0',overflowY:'auto'}}>
            <div style={{padding:'0 12px',marginBottom:18}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.1em',color:'rgba(255,255,255,0.2)',textTransform:'uppercase',marginBottom:6,padding:'0 2px'}}>Case</div>
              {navItems.map(({id,label})=>(
                <button key={id} onClick={()=>setActiveView(id)} style={{
                  display:'flex',alignItems:'center',gap:8,width:'100%',padding:'7px 8px',
                  borderRadius:4,fontSize:12,textAlign:'left',cursor:'pointer',border:'none',
                  background:activeView===id?C.teal:'transparent',
                  color:activeView===id?C.white:'rgba(255,255,255,0.55)',
                  marginBottom:2,transition:'all 0.1s'
                }}>
                  <div style={{width:5,height:5,borderRadius:'50%',background:'currentColor',opacity:0.6,flexShrink:0}}/>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:'12px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{background:'rgba(255,255,255,0.04)',borderRadius:5,padding:'10px',textAlign:'center'}}>
              <div style={{fontFamily:'monospace',fontSize:9,color:'rgba(255,255,255,0.35)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>Model confidence</div>
              <div style={{fontFamily:'monospace',fontSize:22,fontWeight:600,color:C.teal,lineHeight:1}}>{scenario.confidence}%</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,0.3)',marginTop:3}}>{scenario.comparableCases} comparable cases</div>
            </div>
          </div>
        </div>

        {/* Main content */}
        <div style={{background:C.surface,overflowY:'auto',padding:'20px'}}>
          {activeView==='assessment' && <AssessmentView scenario={scenario} onFeedbackSent={()=>setFeedbackSent(true)} feedbackSent={feedbackSent}/>}
          {activeView==='feedback'   && <FeedbackView scenario={scenario} feedbackSent={feedbackSent}/>}
          {activeView==='payer'      && <PayerView scenario={scenario}/>}
          {activeView==='patterns'   && <PatternsView scenario={scenario}/>}
          {activeView==='reports'    && <ReportsView scenario={scenario}/>}
        </div>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
